<!DOCTYPE html>
<html lang="en">

<head>
    <!-- http://localhost:3000/register.html -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="/assets/img/apatureFavicon.ico">
    <link rel="stylesheet" href="/assets/css/style.css" />
    <title>Code Exhange - Home</title>
</head>

<body>
    <header class="navigationBar"></header>

    <section class="vagabondElements"></section>

    <main class="tempitem">
        <section class="defaultInputBox">
            <h1 data-translate="registermessage"> </h1>
            <label for="userName" data-translate="username"> </label>
            <input id="userName" type="text" name="userName" placeholder="Username...">
            <label for="emailAdress" data-translate="email"> </label>
            <input id="emailInput" type="text" name="emailAdress" placeholder="Email adress...">
            <label for="passWord" data-translate="password"> </label>
            <section class="passPhrase">
                <input id="password" type="password" name="passWord" placeholder="Password...">
                <a class="hideBttn"><i id="eyeSymbol" class="fa-solid fa-eye-slash"></i></a>
                <a class="unHideBttn"><i id="eyeSymbol" class="fa-solid fa-eye"></i></a>
            </section>
            <!-- <p data-translate="alreadymember"></p><a href="login.html" data-translate="loginmessage"> </a> -->
            
            <section class="buttonRow">
                <button class="registerNewUser" data-translate="createaccount"> </button>
                <a href="login.html"><button class="otherOptionRedirect" data-translate="loginmessage"></button> </a>
            </section>       
        </section>
    </main>

    <section class="footerFilin"></section>

    <script src="https://kit.fontawesome.com/d5a758504d.js" crossorigin="anonymous"></script>
    <script src="/src/views/script.ts" type="module"></script>
    <script src="/src/views/RegisterView.ts" type="module"></script>
    <script src="/src/controllers/RegisterController.ts" type="module"></script>
    <script src="/src/views/interface.ts" type="module"></script>

</body>

</html>
