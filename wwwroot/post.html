<!DOCTYPE html>
<html lang="en">

<head>
    <!-- http://localhost:3000/allPosts.html -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="/assets/img/apatureFavicon.ico">
    <link rel="stylesheet" href="/assets/css/style.css" />
    <title>Code Exhange - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.4.0/styles/atom-one-dark.min.css">
</head>

<body>
    <header class="navigationBar"></header>

    <section class="vagabondElements"></section>

        <main class="mainContent">
            <section class="pageTitle">
                <div class="textside">
                    <h1 id="insertQuestionNameHere">Wake up child of man, wake up and smell the ashes</h1>
                    <p class="questionstats"></p>
                </div>
                <a id="notTheOwner"><button data-translate="createpost"></button></a>
                <a id="isTheOwner"><button data-translate="edit"></button></a>
            </section>
           
            <section class="questionsectionContainer">
                <section class="ratingPartMain">
                    <i class="fa-solid fa-thumbs-up"></i>
                    <p class="insertRatingHere"></p>
                    <i class="fa-solid fa-thumbs-down"></i>
                </section>
                <section class="contentPart"></section>
            </section>           

            <section class="awnsersHeader">
                <div class="awnserRow">
                    <h2>Answers:</h2>
                    <h2 id="injectawnseramountHere">0</h2>
                </div>
        
                <button class="basicButton" data-translate="create_answer" id="createAnswer"></button>
            </section>
            <hr class="rightAlignedSepirator" id="desktopFormatContent">

            <section class="addOwnAwnser">
                <div class="addAwnsersTextEditButtons">
                    <div class="addAwnserLeftSide">
                        <button class="bold"><i class="fa-solid fa-bold"></i></button>
                        <button class="italic"><i class="fa-solid fa-italic"></i></a>
                        <button class="link"><i class="fa-solid fa-link"></i></a>
                        <button class="quote"><i class="fa-solid fa-quote-right"></i></a>
                        <button class="code"><i class="fa-solid fa-code"></i></a>
                        <a class="alignTextRight"><i class="fa-solid fa-align-right"></i></a>
                        <a class="aligntextCenter"><i class="fa-solid fa-align-center"></i></a>
                        <a class="alignTextLeft"><i class="fa-solid fa-align-left"></i></a>
                    </div>
                    <div class="addAwnserRightSide">
                        <a class="undo"><i class="fa-solid fa-rotate-left"></i></a>
                        <a class="redo"><i class="fa-solid fa-rotate-right"></i></a>
                        <a class="close"> <i class="fa-solid fa-xmark" id="slightMarginForThisX"></i></a>
                    </div>
                </div>
                <textarea name="addownAwnsertextarea" id="contentInput"></textarea>
                <div class="ownAwnserCanselOrPost">
                    <button class="basicDarkButton desktopFormatContent" id="postAwnser">Post Your Answer</button>
                    <button class="basicDarkButton phoneFormatContnet" id="postAwnser">Post</button>
                    <div>
                        <p>By clicking “Post Your Answer”, you agree to our terms of service and acknowledge you have read our privacy policy.</p>
                        <p id="desktopFormatContent">Copyright Code Exchainge™ | 2024-3024, All rights reserved</p>
                    </div>
                </div>
            </section>

            <!-- This section tag class awnsers is where the comments will be injected -->
            <section class="awnsers"></section>
            <!-- This is where the awnsers will be injected -->
            <section class="noAwnsersFound">
                <h2 data-translate="not_found"></h2>
                <a href="createPost.html" class="basicButton navLink" data-translate="own_question"></a>
            </section>

            <!-- <div class="backgroundOppaciter"></div>
            <section class="addAwnserPopup">
                <p>FUEGO!</p>
            </section> -->
            
           

        </main>    

    <section class="footerFilin"></section>

    <script src="https://kit.fontawesome.com/d5a758504d.js" crossorigin="anonymous"></script>
    <script src="/src/views/script.ts" type="module"></script>
    <script src="/src/views/interface.ts" type="module"></script>
    <script src="/src/views/PostView.ts" type="module"></script>
    <script src="/src/controllers/PostController.ts" type="module"></script>
</body>
