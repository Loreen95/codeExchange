<!DOCTYPE html>
<html lang="en">

<head>
    <!-- http://localhost:3000/profile.html -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="/assets/img/apatureFavicon.ico">
    <link rel="stylesheet" href="/assets/css/style.css" />
    <link rel="stylesheet" href="/assets/css/profilePage.css" />
    <title>Code Exhange - Edit Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.4.0/styles/atom-one-dark.min.css">
</head>

<body>
    <header class="navigationBar"></header>

    <section class="vagabondElements"></section>

    <main class="tempitem">
        <section class="editProfileTitleCardContainer">
            <p data-translate="profile">Edit Profile</p>
        </section>

        <section class="editProfileContainer">
            <section class="editUserInfoSide">
                <figure class="profilePicture profilePictureInEdit" id="profilePictureContainer">
                    <img id="uploadedImage" src="./assets/img/user.jpg" alt="Profile Picture">
                    <label for="profilePictureInput">
                        <input type="file" id="profilePictureInput" class="hidden-file-input" accept="image/*"/>
                    </label>
                </figure>
                <label for="username" data-translate="username"></label>
                <input name="username" type="text" placeholder="Username..." id="username">

                <label for="email" data-translate="email"></label>
                <input name="email" type="email" placeholder="Email Adress..." id="email">

                <label for="dob" data-translate="dob"></label>
                <input name="dob" type="date" placeholder="" id="dob">
            </section>
            <section class="editAccountInfoSide">
                <label for="biography" data-translate="biography" class="biographyLabel"></label>
                <textarea name="biography" id="bioEditor" placeholder="Tell us something about yourself"></textarea>
                <div class="expertiseRow">
                    <div class="expertiseOptions expertiseOptions2">
                        <label for="expertise" data-translate="expertise"></label>
                        <input name="expertise" type="text" placeholder="Expertise..." id="expertise">
                    </div>
                    
                    <div class="expertiseOptions">
                        <label for="yearsexperience" data-translate="yearsexperience"></label>
                        <input name="yearsexperience" type="text" placeholder="Years of experience..." id="yearsexperience">
                    </div>
                </div>
            </section>
        </section>
        <div class="thebelowButtonStuffAgain"> 
            <a href="profile.html"><button class="cansel" data-translate="cancel"></button></a>
            <button class="applyChaingesBttn" data-translate="applychanges"></button>
        </div>

        <div class="escapeTheNightmare">
            <p class="whenWillItEnd" data-translate="enough">Had enough?</p>
            <button class="deleteAccountBttn" data-translate="deleteaccount"></button>
        </div>

    </main>

    <section class="footerFilin"></section>

    <script src="https://kit.fontawesome.com/d5a758504d.js" crossorigin="anonymous"></script>
    <script src="/src/views/script.ts" type="module"></script>
    <script src="/src/views/interface.ts" type="module"></script>
    <script src="/src/views/index.ts" type="module"></script>
    <script src="/src/views/ProfileView.ts" type="module"></script>
    <script src="/src/controllers/ProfileController.ts" type="module"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.4.0/highlight.min.js"></script>
    <script>hljs.highlightAll();</script>
    <script>
        const imageInput = document.getElementById('profilePictureInput');
        const uploadedImage = document.getElementById('uploadedImage');
        imageInput.addEventListener("change", function () {
            if (imageInput.files && imageInput.files[0]) {
                const reader = new FileReader();
                console.log("Ik zie een fileReader");
                reader.onload = function (e) {
                    console.log("Bestand geupload: ", e.target.result);
                    if (uploadedImage) {
                        uploadedImage.src = e.target.result;
                        uploadedImage.alt = "Profile Picture Preview";
                        console.log("Afbeelding geladen: ", uploadedImage.src);
                    } else {
                        console.error("Afbeelding element niet gevonden.");
                    }
                };
                reader.readAsDataURL(imageInput.files[0]);
            } else {
                console.error("Geen bestand geselecteerd.");
            }
        });
    </script>
</body>
