<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="/assets/img/apatureFavicon.ico">
    <link rel="stylesheet" href="/assets/css/style.css" />
    <link rel="stylesheet" href="/assets/css/profilePage.css" />
    <title>Code Exhange</title>
</head>

<body>
    <header class="navigationBar"></header>

    <section class="vagabondElements"></section>

    <main class="tempitem">
        <section class="editProfileTitleCardContainer">
            <p data-translate="edit_own_question">Ask your question</p>
        </section>

            <section class="addOwnAwnser noDiplayNone">
            <!-- <h1 data-translate="postmessage"> </h1> -->
            <div class="addAwnsersTextEditButtons">
                <div class="addAwnserLeftSide">
                    <a class="bold"><i class="fa-solid fa-bold"></i></a>
                    <a class="italic"><i class="fa-solid fa-italic"></i></a>
                    <a class="link"><i class="fa-solid fa-link"></i></a>
                    <a class="code"><i class="fa-solid fa-code"></i></a>
                </div>
                <div class="addAwnserRightSide">
                    <a class="undo"><i class="fa-solid fa-rotate-left"></i></a>
                    <a class="redo"><i class="fa-solid fa-rotate-right"></i></a>
                </div>
            </div>
            <input id="titleInput" type="text" name="title" placeholder="Title...">
            <textarea class="addownAwnsertextarea2" name="addownAwnsertextarea" id="contentInput"></textarea>
            <div class="ownAwnserCanselOrPost">
                <button class="basicDarkButton" id="clacelEditAwnser" data-translate="cancel"></button>
                <button class="basicDarkButton" id="editPost" data-translate="editPost"></button>
            </div>      
        </section>
    </main>

    <section class="footerFilin"></section>

    <script src="https://kit.fontawesome.com/d5a758504d.js" crossorigin="anonymous"></script>
    <script src="/src/views/script.ts" type="module"></script>
    <script src="/src/views/RegisterView.ts" type="module"></script>
    <script src="/src/views/PostView.ts" type="module"></script>
    <script src="/src/views/interface.ts" type="module"></script>

</body>

</html>
