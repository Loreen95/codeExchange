<!DOCTYPE html>
<html lang="en">

<head>
    <!-- http://localhost:3000/profile.html -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="/assets/img/apatureFavicon.ico">
    <link rel="stylesheet" href="/assets/css/style.css" />
    <link rel="stylesheet" href="/assets/css/profilePage.css" />
    <title>Code Exhange - Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.4.0/styles/atom-one-dark.min.css">
</head>

<body>
    <header class="navigationBar"></header>

    <section class="vagabondElements"></section>

    <main class="tempitem">
        <section class="userInfoSidebar">
            <figure class="profilePicture">
                <i class="fa-regular fa-circle-user"></i>
            </figure>
            <aside class="userInformation">
                <p data-translate="username"></p>
                <h3 id="insertNameHere"></h3>
                <p data-translate="email"></p>
                <h3 id="insertEmailHere"></h3>
                <p data-translate="dob"></p>
                <p id="insertBirthdayHere"></p>           
                <section class="userLinks">
                    <a href="" class="navLink onlyForOwnerOfAccount" id="edit">Edit</a>
                    <!-- <a href="" class="navLink" id="delete">Delete</a> -->
                </section>             
            </aside>
        </section>

        <section class="profileStats">
            <aside class="theActualProfileStetistics">
                <div class="rowAlign2"><p data-translate="memberSince"></p> <p id="memberSince"></p></div>
                
                <div class="profilestatisticsStatsBottom">
                    <div class="rowAlign"><h2 data-translate="totalpost"></h2> <h2 id="totalPosts"></h2></div>
                    <div class="rowAlign"><h2 data-translate="totalanswer"></h2> <h2 id="totalComments"></h2></div>
                </div>
            </aside>
            <aside class="totalRating">
                <div class="ratingTotalCenterContainer">
                    <h1 data-translate="totalrating"></h1>
                    <p id="totalRating"></p>
                </div>
            </aside>
        </section>

        <section class="userBiography">
            <h1 data-translate="biography"></h1>
            <p id="insertBiographyHere"> 
                
            </p>
        </section>

        <hr class="rightAlignedSepirator">
        <section class="defaultTitleStyling">
                <h2 id="insertNameHere"></h2>
                <h2 id="space">'s </h2> <h2 class="spacing" data-translate="posts"></h2>
        </section>
       
        <section class="posts"></section>

        <div id="profileInfo">

        </div>        
    </main>

    <section class="footerFilin"></section>

    <script src="https://kit.fontawesome.com/d5a758504d.js" crossorigin="anonymous"></script>
    <script src="/src/views/script.ts" type="module"></script>
    <script src="/src/views/interface.ts" type="module"></script>
    <script src="/src/views/index.ts" type="module"></script>
    <script src="/src/views/profileView.ts" type="module"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.4.0/highlight.min.js"></script>
    <script>hljs.highlightAll();</script>
</body>
