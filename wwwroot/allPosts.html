<!DOCTYPE html>
<html lang="en">

<head>
    <!-- http://localhost:3000/allPosts.html -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="/assets/img/apatureFavicon.ico">
    <link rel="stylesheet" href="/assets/css/style.css" />
    <title>Code Exhange - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.4.0/styles/atom-one-dark.min.css">
</head>

<body>
    <header class="navigationBar"></header>

    <section class="vagabondElements"></section>

        <main class="mainContent">
            <section class="pageTitle">
                <div class="textside">
                    <h1 data-translate="all_questions"></h1>
                    <p id="questionStats"></p>
                </div>
                <button data-translate="createpost"></button>
            </section>
    
            <section class="filterContainer">
                <!-- <h1>Filters:</h1> -->
                <label for="wordFilter">filter words</label>
                <div class="filterInput">
                    <input type="text" name="wordFilter" id="wordFilter">
                    <button class="wordFilterBttn"><i class="fa-solid fa-arrow-right"></i></button>
                </div>
                
                <label for="expertiseFilter">filter expertise</label>
                <div class="filterInput">
                    <input type="text" name="expertiseFilter" id="expertiseFilter">
                    <button class="expertiseFilterBttn"><i class="fa-solid fa-arrow-right"></i></button>
                </div>

                <div class="buttonFilters">
                    <button class="filterOutNoComments" data-translate="answeredQuestions">Questions</button>
                    <button class="filterOutNegativeRating" data-translate="highestRated">Highest</button>                  
                </div>

                <div class="arrowLafel">
                    <div class="openAndCloseFilters">
                        <i class="fa-solid fa-chevron-right" id="lillArrow"></i>    
                    </div>
                </div>
            </section>

            <section class="posts"></section>

        </main>    

    <section class="footerFilin"></section>

    <script src="https://kit.fontawesome.com/d5a758504d.js" crossorigin="anonymous"></script>
    <script src="/src/views/script.ts" type="module"></script>
    <script src="/src/views/interface.ts" type="module"></script>
    <script src="/src/views/PostView.ts" type="module"></script>
    <script src="/src/controllers/PostController.ts" type="module"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.4.0/highlight.min.js"></script>
    <script>hljs.highlightAll();</script>
</body>
